<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img">
<style>@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700');text{font-family:'Fredoka','Baloo 2','Comic Sans MS',sans-serif;font-weight:600;}</style>
  <title>Vale Sinay - Mapa do Estado</title>
  <desc>Mapa de RPG cartoon do Vale Sinay com tres cidades, rio, montanhas e gradiente de gosma neon a partir de Fabrilandia.</desc>
